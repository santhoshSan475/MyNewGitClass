<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>
<body>
   <table class="table table-bordered table-dark">
       <thead>
         <tr>
             <th>PatientName</th>
             <th>Age</th>
             <th>disease</th>
             <th>block</th>
             <th>Update</th>
             <th>Delete</th>
         </tr>
       </thead>
       <tbody>
         {% for p in patient %}
            <tr>
             <td>{{p.patientName}}</td>
             <td>{{p.Age}}</td>
             <td>{{p.disease}}</td>
             <td>{{p.block}}</td>
             <td><button ><a href="{% url 'updateData' p.id %}" target="_blank">Update</a></button></td>
             <td><button ><a href="{% url 'deleteData' p.id %}" target="_blank">Delete</a></button></td>
            </tr>
         {% endfor %}
       </tbody>
   </table>
</body>
</html>
